<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir & Operasional</title>
    <style>
        /* CSS Bawaan Aplikasi */
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: #f8fafc; color: #1e293b; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex: 1; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .menu-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; background: #fff; }
        .btn-qty { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #dcfce7; color: #15803d; }
        .btn-minus { background: #fee2e2; color: #b91c1c; }
        .keranjang-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .input-bayar { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .select-metode { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 10px; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: #2563eb; color: #fff; }
        .btn-action:hover { background: #1d4ed8; }
        
        /* CSS BARU: DIALOG KEREN & SHIFT SUMMARY */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: #ffffff; width: 90%; max-width: 440px; border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 28px; transform: scale(0.9); transition: all 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .spinner {
            width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #3b82f6;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nota-item-list { max-height: 160px; overflow-y: auto; margin: 12px 0; border-top: 1px dashed #e2e8f0; border-bottom: 1px dashed #e2e8f0; padding: 10px 0; }
        .nota-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .nota-total-section { background: #f8fafc; padding: 12px; border-radius: 12px; margin-top: 12px; }
        .nota-kembalian-box { text-align: center; margin-top: 16px; padding: 12px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; }
        .text-kembalian-besar { font-size: 30px; font-weight: 800; color: #16a34a; margin-top: 2px; }
        .btn-konfirmasi { width: 100%; background: #16a34a; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        .btn-batal { width: 100%; background: transparent; color: #64748b; border: 1px solid #cbd5e1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }
        
        .shift-container { display: flex; gap: 10px; margin-top: 15px; }
        .shift-box { flex: 1; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; color: #1e293b; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .shift-box.pagi { border-left: 4px solid #f59e0b; }
        .shift-box.malam { border-left: 4px solid #6366f1; }
        .shift-box span { display: block; font-size: 16px; margin-top: 4px; color: #0f172a; }
        
        .notif { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: white; font-weight: bold; z-index: 10000; display: none; }
        .notif.success { background: #10b981; }
        .notif.error { background: #ef4444; }
    </style>
</head>
<body>

    <div id="notif-box" class="notif"></div>

    <!-- DIALOG 1: SEDANG MENYINKRON DATA (OTOMATIS AKTIF SAAT BUKA) -->
    <div id="dialog-sync" class="modal-overlay active">
        <div class="modal-box" style="text-align: center; max-width: 280px;">
            <div class="spinner"></div>
            <h3 style="margin: 0 0 4px 0; font-size: 16px;">Sedang menyinkron data</h3>
            <p style="margin: 0; color: #64748b; font-size: 13px;">Memuat konfigurasi sistem...</p>
        </div>
    </div>

    <!-- DIALOG 2: NOTA / KONFIRMASI PEMBAYARAN CASH -->
    <div id="dialog-nota" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">📝 Konfirmasi Transaksi</div>
            <div id="nota-items" class="nota-item-list"></div>
            <div class="nota-total-section">
                <div class="nota-row"><span>Total Harus Dibayar:</span><span id="nota-grand-total" style="font-weight:700;">Rp 0</span></div>
                <div class="nota-row"><span>Uang yang Digunakan:</span><span id="nota-uang-diterima">Rp 0</span></div>
            </div>
            <div class="nota-kembalian-box">
                <div style="font-size: 12px; color: #166534; font-weight: 600; text-transform: uppercase;">Kembalian Anda</div>
                <div id="nota-kembalian" class="text-kembalian-besar">Rp 0</div>
            </div>
            <button class="btn-konfirmasi" onclick="eksekusiPembayaranAkhir()">Konfirmasi & Simpan</button>
            <button class="btn-batal" onclick="tutupDialogNota()">Batal</button>
        </div>
    </div>

    <!-- KONTEN UTAMA APLIKASI KASIR -->
    <div class="container">
        <!-- Panel Kiri: Menu -->
        <div class="panel">
            <h2>Daftar Menu</h2>
            <div id="menu-container" class="menu-grid"></div>
        </div>
        
        <!-- Panel Kanan: Kasir & Laporan -->
        <div class="panel" style="max-width: 400px;">
            <h2>Keranjang Belanja</h2>
            <div id="keranjang-container" style="min-height: 80px; margin-bottom: 15px;"></div>
            
            <h3 id="display-total" style="margin: 10px 0;">Total: Rp 0</h3>
            
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 4px;">Metode Pembayaran:</label>
            <select id="select-metode" class="select-metode" onchange="kondisiInputMetode()">
                <option value="Cash">Cash / Tunai</option>
                <option value="QRIS">QRIS</option>
            </select>
            
            <div id="wrapper-input-cash">
                <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 4px;">Uang Tunai Diterima:</label>
                <input type="number" id="input-manual-bayar" class="input-bayar" placeholder="Masukkan nominal uang...">
            </div>
            
            <button class="btn-action" style="margin-top: 15px;" onclick="bayarSekarang()">PROSES SEKARANG</button>
            
            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #e2e8f0;">
            
            <h2>Laporan Shift Hari Ini</h2>
            <div class="shift-container">
                <div class="shift-box pagi">
                    Shift Pagi
                    <span id="total-shift-pagi">Rp 0</span>
                </div>
                <div class="shift-box malam">
                    Shift Malam
                    <span id="total-shift-malam">Rp 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE UTAMA (TIDAK DIUBAH) ---
        const APPS_SCRIPT_URL = "#"; // Ganti dengan URL Web App Google Apps Script Anda
        
        let daftarMenu = [
            { nama: "Kopi Susu", harga: 15000 },
            { nama: "Americano", harga: 12000 },
            { nama: "Roti Bakar", harga: 10000 },
            { nama: "Kentang Goreng", harga: 12000 }
        ];
        
        let orderan = {};
        let grandTotal = 0;
        let dataTransaksiSemua = []; // Database transaksi lokal
        let dataTransaksiTertunda = null; // Penampung internal untuk data transaksi cash

        // --- SISTEM NOTIFIKASI BAWAAN ---
        function triggerNotif(msg, tipe) {
            let box = document.getElementById("notif-box");
            box.innerText = msg;
            box.className = `notif ${tipe}`;
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 3000);
        }

        // --- RENDER MENU & LOGIKA KERANJANG (TIDAK DIUBAH) ---
        function renderMenu() {
            let html = "";
            daftarMenu.forEach(item => {
                let namaAman = item.nama.replace(/'/g, "\\'");
                let qty = orderan[item.nama] || 0;
                html += `
                    <div class="menu-card">
                        <div style="font-weight: bold; margin-bottom: 6px;">${item.nama}</div>
                        <div style="color: #64748b; font-size: 13px; margin-bottom: 8px;">Rp ${item.harga.toLocaleString()}</div>
                        <div>
                            <button class="btn-qty btn-minus" onclick="ubahQty('${namaAman}', -1)">-</button>
                            <span style="margin: 0 8px; font-weight: bold;">${qty}</span>
                            <button class="btn-qty btn-plus" onclick="ubahQty('${namaAman}', 1)">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById("menu-container").innerHTML = html;
        }

        function ubahQty(nama, delta) {
            orderan[nama] = Math.max(0, (orderan[nama] || 0) + delta);
            if (orderan[nama] === 0) delete orderan[nama];
            kalkulasiNota();
            renderMenu();
        }

        function kalkulasiNota() {
            let html = "";
            grandTotal = 0;
            Object.keys(orderan).forEach(nama => {
                let target = daftarMenu.find(m => m.nama === nama);
                if (target) {
                    let sub = target.harga * orderan[nama];
                    grandTotal += sub;
                    html += `
                        <div class="keranjang-item">
                            <span>${nama} x${orderan[nama]}</span>
                            <span>Rp ${sub.toLocaleString()}</span>
                        </div>
                    `;
                }
            });
            if(html === "") html = "<div style='color:#94a3b8; font-size:14px;'>Belum ada item dipilih.</div>";
            document.getElementById("keranjang-container").innerHTML = html;
            document.getElementById("display-total").innerText = `Total: Rp ${grandTotal.toLocaleString()}`;
        }

        function kondisiInputMetode() {
            let metode = document.getElementById("select-metode").value;
            let wrapCash = document.getElementById("wrapper-input-cash");
            if (metode === "QRIS") {
                wrapCash.style.display = "none";
            } else {
                wrapCash.style.display = "block";
            }
        }

        function beralihKeWita(date) {
            return new Date(date.getTime() + (8 * 60 * 60 * 1000));
        }

        // --- PROSES SHIFT (PAGI & MALAM) ---
        function prosesLaporanHarian() {
            let totalShiftPagi = 0;
            let totalShiftMalam = 0;

            dataTransaksiSemua.forEach(tx => {
                let txDate = new Date(tx.tanggal);
                let jam = txDate.getHours();
                
                // Pembagian parameter shift (Pagi jam 06:00 s.d 14:59, Malam jam 15:00 s.d 05:59)
                if (jam >= 6 && jam < 15) {
                    totalShiftPagi += Number(tx.total || 0);
                } else {
                    totalShiftMalam += Number(tx.total || 0);
                }
            });

            // Update data angka ke UI Box Shift
            document.getElementById("total-shift-pagi").innerText = `Rp ${totalShiftPagi.toLocaleString()}`;
            document.getElementById("total-shift-malam").innerText = `Rp ${totalShiftMalam.toLocaleString()}`;
        }

        // --- INTEGRASI ALUR PEMBAYARAN & DIALOG BARU ---
        function bayarSekarang() {
            if (Object.keys(orderan).length === 0) {
                triggerNotif("❌ Keranjang masih kosong!", "error");
                return;
            }
            
            let metode = document.getElementById("select-metode").value;
            let nominalInput = parseFloat(document.getElementById("input-manual-bayar").value) || 0;
            
            if (metode === "Cash" && nominalInput < grandTotal) {
                triggerNotif("❌ Uang yang dibayarkan kurang!", "error");
                return;
            }

            let itemRingkas = Object.keys(orderan).map(nama => `${nama} (${orderan[nama]}x)`).join(", ");
            let skrgWita = beralihKeWita(new Date());

            let paketData = {
                aksi: "tambahTransaksi",
                tanggal: skrgWita.toISOString(),
                item: itemRingkas,
                metode: metode,
                total: grandTotal
            };

            if (metode === "QRIS") {
                // JIKA QRIS: Menampilkan pesan yang sekarang secara orisinal tanpa diubah
                alert("Silakan Scan QRIS yang tertera pada layar EDC/Sticker. Pastikan status transaksi Berhasil!");
                
                // Eksekusi kirim data langsung khusus QRIS
                dataTransaksiTertunda = paketData;
                eksekusiPembayaranAkhir();
            } else {
                // JIKA CASH: Memunculkan Dialog Keren berisi Item, Harga, Uang Diterima, & Kembalian Huruf Besar
                dataTransaksiTertunda = paketData;
                
                let htmlItems = "";
                Object.keys(orderan).forEach(nama => {
                    let target = daftarMenu.find(m => m.nama === nama);
                    let sub = target ? target.harga * orderan[nama] : 0;
                    htmlItems += `<div class="nota-row"><span>${nama} x${orderan[nama]}</span><span>Rp ${sub.toLocaleString()}</span></div>`;
                });
                
                document.getElementById("nota-items").innerHTML = htmlItems;
                document.getElementById("nota-grand-total").innerText = `Rp ${grandTotal.toLocaleString()}`;
                document.getElementById("nota-uang-diterima").innerText = `Rp ${nominalInput.toLocaleString()}`;
                
                let kembalian = nominalInput - grandTotal;
                document.getElementById("nota-kembalian").innerText = `Rp ${kembalian.toLocaleString()}`;
                
                // Tampilkan Modal Dialog Cash
                document.getElementById("dialog-nota").classList.add("active");
            }
        }

        function tutupDialogNota() {
            document.getElementById("dialog-nota").classList.remove("active");
            dataTransaksiTertunda = null;
        }

        async function eksekusiPembayaranAkhir() {
            if (!dataTransaksiTertunda) return;
            
            document.getElementById("dialog-nota").classList.remove("active");
            
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(dataTransaksiTertunda)
                });

                triggerNotif("🎉 Berhasil! Transaksi tercatat di Spreadsheet.", "success");

                dataTransaksiSemua.push({
                    tanggal: new Date(),
                    item: dataTransaksiTertunda.item,
                    metode: dataTransaksiTertunda.metode,
                    total: dataTransaksiTertunda.total
                });

                // Reset State Form Kasir
                orderan = {};
                grandTotal = 0;
                document.getElementById("input-manual-bayar").value = "";
                kalkulasiNota();
                renderMenu();
                prosesLaporanHarian();
            } catch(e) {
                triggerNotif("❌ Jaringan Bermasalah.", "error");
            }
            dataTransaksiTertunda = null;
        }

        // --- SIMULASI AWAL SAAT PERTAMA KALI DIBUKA ---
        window.addEventListener("DOMContentLoaded", () => {
            renderMenu();
            kalkulasiNota();
            
            // Mensimulasikan loading sinkronisasi awal data selama 2 detik
            setTimeout(() => {
                document.getElementById("dialog-sync").classList.remove("active");
                triggerNotif("🔄 Sinkronisasi data berhasil!", "success");
                prosesLaporanHarian();
            }, 2000);
        });
    </script>
</body>
</html>
