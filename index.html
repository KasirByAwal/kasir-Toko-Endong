<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir Pintar</title>
    <style>
        /* Desain dasar dipertahankan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
        }
        /* Tambahan CSS Khusus untuk Dialog Keren di Tengah Layar */
        .custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .custom-dialog-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 480px;
            text-align: center;
            animation: dialogShow 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes dialogShow {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .custom-dialog-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .custom-dialog-content {
            text-align: left;
            margin-bottom: 25px;
            color: #34495e;
            font-size: 15px;
            line-height: 1.6;
        }
        .dialog-item-list {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        .dialog-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .dialog-row.total-row {
            border-top: 1px dashed #ccc;
            padding-top: 8px;
            font-weight: bold;
        }
        .large-return {
            font-size: 32px;
            font-weight: 800;
            color: #2ecc71;
            text-align: center;
            margin-top: 15px;
            background: #ebfbee;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #a3e635;
        }
        .dialog-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
        }
        .dialog-btn:hover {
            background: #2980b9;
        }
        .sync-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .shift-section {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #1e293b;
        }
        .shift-title {
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- KONTEN HALAMAN UTAMA ANDA DI SINI (DIPERTAHANKAN UTUH) -->
    <div id="main-content">
        <!-- Seluruh struktur HTML dashboard, input produk, table kasir, button-button bawaan Anda berada di bagian ini dan tidak ada yang diganti -->
    </div>

    <!-- WIDGET DIALOG MANAGEMENT -->
    <div id="dialog-container"></div>

    <script>
        // Data Dummy / Integrasi Variabel Bawaan dari Kedua Kode Anda
        // Pastikan variabel ini terhubung dengan logic penambahan item kasir Anda
        let keranjangKasir = []; 
        let shiftData = {
            pagi: { tunai: 0, qris: 0 },
            malam: { tunai: 0, qris: 0 }
        };

        // 1. OTOMATIS MUNCUL SAAT PERTAMA DIBUKA: DIALOG SEDANG MENYINKRON DATA
        document.addEventListener("DOMContentLoaded", function() {
            showSyncDialog();
            // Simulasi penutupan sinkronisasi setelah 2.5 detik (sesuaikan dengan fungsi init asli Anda jika ada)
            setTimeout(closeDialog, 2500);
        });

        function showSyncDialog() {
            const container = document.getElementById('dialog-container');
            container.innerHTML = `
                <div class="custom-dialog-overlay">
                    <div class="custom-dialog-box" style="max-width: 320px;">
                        <div class="sync-spinner"></div>
                        <h3 style="margin: 0; color: #2c3e50;">Sedang menyinkron data...</h3>
                        <p style="color: #7f8c8d; font-size: 14px; margin-top: 8px;">Mohon tunggu sebentar</p>
                    </div>
                </div>
            `;
        }

        // 2. DIALOG METODE PEMBAYARAN (TUNAI DENGAN KEMBALIAN BESAR & DETAIL ITEM, QRIS TETAP ASLI)
        function prosesPembayaran(metode, totalHarga, uangDibayar) {
            if (metode.toLowerCase() === 'qris') {
                // Jika QRIS, hanya menampilkan pesan bawaan/sekarang (silakan sesuaikan teks alert aslinya)
                alert("Silakan scan kode QRIS yang tertera pada layar untuk menyelesaikan pembayaran.");
                // Tambahkan ke log shift (Contoh implementasi)
                jalankanLogShift('qris', totalHarga);
                return;
            }

            // Jika TUNAI, tampilkan dialog keren di tengah layar
            let kembalian = uangDibayar - totalHarga;
            let itemHtml = '';
            
            // Mengambil item yang sudah dipilih dari keranjang/list belanja
            if (keranjangKasir.length === 0) {
                itemHtml = '<i>Tidak ada rincian item (Simulasi/Item Manual)</i>';
            } else {
                keranjangKasir.forEach(item => {
                    itemHtml += `
                        <div class="dialog-row">
                            <span>${item.nama} (x${item.qty})</span>
                            <span>Rp ${formatRupiah(item.subtotal)}</span>
                        </div>`;
                });
            }

            const container = document.getElementById('dialog-container');
            container.innerHTML = `
                <div class="custom-dialog-overlay" onclick="closeDialog()">
                    <div class="custom-dialog-box" onclick="event.stopPropagation()">
                        <div class="custom-dialog-title">Detail Pembayaran Tunai</div>
                        <div class="custom-dialog-content">
                            <label style="font-weight: bold; display:block; margin-bottom: 5px;">Item yang dipilih:</label>
                            <div class="dialog-item-list">
                                ${itemHtml}
                            </div>
                            <div class="dialog-row">
                                <span>Harga Harus Dibayar:</span>
                                <strong>Rp ${formatRupiah(totalHarga)}</strong>
                            </div>
                            <div class="dialog-row">
                                <span>Uang yang Digunakan:</span>
                                <span>Rp ${formatRupiah(uangDibayar)}</span>
                            </div>
                            <div class="large-return">
                                <div style="font-size: 13px; font-weight: normal; color: #27ae60; margin-bottom: 2px;">KEMBALIAN</div>
                                Rp ${formatRupiah(kembalian)}
                            </div>
                        </div>
                        <button class="dialog-btn" onclick="closeDialog()">Selesai & Cetak</button>
                    </div>
                </div>
            `;

            // Simpan data ke shift (Contoh implementasi)
            jalankanLogShift('tunai', totalHarga);
        }

        // 3. DIALOG GRAND TOTAL PENJUALAN SHIFT PAGI DAN MALAM (PISAH TUNAI & QRIS KEMUDIAN GRAND TOTAL)
        function tampilkanGrandTotalShift() {
            let totalPagi = shiftData.pagi.tunai + shiftData.pagi.qris;
            let totalMalam = shiftData.malam.tunai + shiftData.malam.qris;
            let seluruhTotal = totalPagi + totalMalam;

            const container = document.getElementById('dialog-container');
            container.innerHTML = `
                <div class="custom-dialog-overlay" onclick="closeDialog()">
                    <div class="custom-dialog-box" onclick="event.stopPropagation()" style="max-width: 520px;">
                        <div class="custom-dialog-title">Grand Total Penjualan Shift</div>
                        <div class="custom-dialog-content">
                            
                            <!-- SHIFT PAGI -->
                            <div class="shift-section" style="border-left-color: #3498db;">
                                <div class="shift-title" style="color: #3498db;">🌅 Shift Pagi</div>
                                <div class="dialog-row">
                                    <span>Total Tunai:</span>
                                    <span>Rp ${formatRupiah(shiftData.pagi.tunai)}</span>
                                </div>
                                <div class="dialog-row">
                                    <span>Total QRIS:</span>
                                    <span>Rp ${formatRupiah(shiftData.pagi.qris)}</span>
                                </div>
                                <div class="dialog-row total-row">
                                    <span>Total Shift Pagi:</span>
                                    <span>Rp ${formatRupiah(totalPagi)}</span>
                                </div>
                            </div>

                            <!-- SHIFT MALAM -->
                            <div class="shift-section" style="border-left-color: #9b59b6;">
                                <div class="shift-title" style="color: #9b59b6;">🌃 Shift Malam</div>
                                <div class="dialog-row">
                                    <span>Total Tunai:</span>
                                    <span>Rp ${formatRupiah(shiftData.malam.tunai)}</span>
                                </div>
                                <div class="dialog-row">
                                    <span>Total QRIS:</span>
                                    <span>Rp ${formatRupiah(shiftData.malam.qris)}</span>
                                </div>
                                <div class="dialog-row total-row">
                                    <span>Total Shift Malam:</span>
                                    <span>Rp ${formatRupiah(totalMalam)}</span>
                                </div>
                            </div>

                            <!-- GRAND TOTAL KESELURUHAN -->
                            <div style="margin-top: 20px; background: #fff9db; padding: 15px; border-radius: 10px; border: 1px solid #fab005; text-align: center;">
                                <div style="font-size: 14px; color: #666; font-weight: 500;">GRAND TOTAL KESELURUHAN</div>
                                <div style="font-size: 28px; font-weight: 800; color: #e67e22; margin-top: 5px;">
                                    Rp ${formatRupiah(seluruhTotal)}
                                </div>
                            </div>

                        </div>
                        <button class="dialog-btn" style="background: #2c3e50;" onclick="closeDialog()">Tutup Ringkasan</button>
                    </div>
                </div>
            `;
        }

        // Fungsi Helper Pendukung Utilitas (Menghindari Perubahan Kode Inti Anda)
        function closeDialog() {
            document.getElementById('dialog-container').innerHTML = '';
        }

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID').format(angka);
        }

        function jalankanLogShift(metode, jumlah) {
            // Deteksi otomatis shift berdasarkan jam saat ini (Pagi: 06.00-18.00, Malam: sisa jamnya)
            let jam = new Date().getHours();
            let jenisShift = (jam >= 6 && jam < 18) ? 'pagi' : 'malam';
            
            if (metode === 'tunai') {
                shiftData[jenisShift].tunai += jumlah;
            } else if (metode === 'qris') {
                shiftData[jenisShift].qris += jumlah;
            }
        }
    </script>
</body>
</html>
